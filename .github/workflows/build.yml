name: Build VSIX

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  NODE_VERSION: 24.14.1
  NPM_VERSION: 11.11.0

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run package

      - name: Set version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          NEW_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $NEW_VERSION"

      - name: Package VSIX
        id: package
        shell: bash
        run: |
          npm exec -- vsce package --no-dependencies
          VSIX_FILE=$(ls *.vsix | head -n 1)
          echo "VSIX_FILE=$VSIX_FILE" >> "$GITHUB_ENV"
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "VSIX file: $VSIX_FILE"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-venv-toolkit-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.vsix_file }}
          retention-days: 90

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" "${{ steps.package.outputs.vsix_file }}" \
            --title "Python Venv Toolkit ${{ steps.version.outputs.version }}" \
            --notes "Automated VSIX build for commit ${{ github.sha }}."
